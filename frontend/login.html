<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Worldwide Easy View</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="login-wrapper">

    <!-- Left Panel -->
    <div class="login-panel-left">
      <div class="brand">
        <img src="../Frame/PwC-logo 1.png" alt="PwC" class="brand-logo" onerror="this.style.display='none'" />
        <span class="brand-name">Worldwide Easy View</span>
      </div>
      <p class="brand-tagline">회사 제시 자료를 보기 쉬운 보고서로</p>
    </div>

    <!-- Right Panel -->
    <div class="login-panel-right">
      <div class="login-box">
        <h2 class="login-title">로그인</h2>
        <p class="login-sub">계정 정보를 입력해주세요</p>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@pwc.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required />
              <button type="button" class="toggle-pw" id="togglePw" aria-label="비밀번호 표시/숨기기">
                <!-- iconHide: 비밀번호가 보일 때 표시 (클릭하면 숨김) -->
                <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <!-- iconShow: 비밀번호가 숨겨질 때 표시 (클릭하면 보여줌) -->
                <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="btn-group">
            <button type="submit" class="btn-login">로그인</button>
            <button type="button" class="btn-register" id="registerBtn">등록하기</button>
          </div>
        </form>

        <div class="bottom-links">
          <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
          <a href="#" class="forgot-link" id="forgotBtn">비밀번호를 잊었습니다</a>
        </div>
      </div>
    </div>

  </div>

  <script src="js/login.js"></script>
</body>
</html>
